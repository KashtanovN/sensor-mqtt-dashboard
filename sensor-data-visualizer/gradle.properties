hilla.active=false

# Jmix CDN can be very slow; long timeouts reduce "Read timed out" on first resolve
systemProp.org.gradle.internal.http.connectionTimeout=600000
systemProp.org.gradle.internal.http.socketTimeout=600000

# More retries / longer backoff when the CDN drops mid-download (internal Gradle knobs)
systemProp.org.gradle.internal.repository.max.tentatives=25
systemProp.org.gradle.internal.repository.initial.backoff=5000

# Prefer IPv4 — sometimes fixes flaky routes to global.repo.jmix.io
org.gradle.jvmargs=-Xmx2g -Dfile.encoding=UTF-8 -Djava.net.preferIPv4Stack=true
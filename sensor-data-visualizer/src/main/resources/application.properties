main.datasource.url = jdbc:hsqldb:file:.jmix/hsqldb/sensorvisualizer
main.datasource.username = sa
main.datasource.password =

main.liquibase.change-log=com/company/userregistration/liquibase/changelog.xml

jmix.ui.login-view-id = LoginView
jmix.ui.main-view-id = MainView
jmix.ui.menu-config = com/company/userregistration/menu.xml
jmix.ui.composite-menu = true

ui.login.defaultUsername = admin
ui.login.defaultPassword = admin

jmix.core.available-locales = en

jmix.ui.component.filter-show-non-jpa-properties=false
# Launch the default browser when starting the application in development mode
vaadin.launch-browser = false

# Use pnpm to speed up project initialization and save disk space
vaadin.pnpm.enable = true

logging.level.org.atmosphere = warn

# 'debug' level logs SQL generated by EclipseLink ORM
logging.level.eclipselink.logging.sql = info

# 'debug' level logs data store operations
logging.level.io.jmix.core.datastore = info

# 'debug' level logs access control constraints
logging.level.io.jmix.core.AccessLogger = debug

# 'debug' level logs all Jmix debug output
logging.level.io.jmix = info
jmix.ui.view-file-extensions=htm, html, jpg, png, jpeg, pdf
jmix.ui.navigation.use-nanoseconds-in-url-params=false
jmix.eclipselink.use-inner-join-in-condition=true

# MQTT (any broker compatible with MQTT 3.1.1, e.g. Mosquitto or a cloud IoT MQTT endpoint)
mqtt.enabled=true
mqtt.broker-url=tcp://127.0.0.1:1883
mqtt.username=
mqtt.password=
mqtt.client-id=sensor-data-visualizer
mqtt.connection-timeout-seconds=10
mqtt.keep-alive-interval-seconds=60
mqtt.subscription-refresh-ms=30000